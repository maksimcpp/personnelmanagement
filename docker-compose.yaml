services:
  db:
    image: postgres:16-alpine
    container_name: backend_postgres
    env_file:
      - ./config/.env
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_app
    ports:
      - "8000:8000"
    networks:
      - backend_net
    depends_on:
      - db


volumes:
  db_data:

networks:
  backend_net:
    driver: bridge